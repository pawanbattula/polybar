include-file = /home/user/.config/polybar/include-modules.ini

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 25
offset-y = 0
bottom = false
fixed-center = true

override-redirect = false

scroll-up = next
scroll-down = prev

enable-ipc = false

background = ${colors.bg}
foreground = ${colors.fg}

; Module separator settings
separator = |
separator-foreground = ${colors.fg-alt}

include-file = /home/user/.config/polybar/fonts.ini

modules-left = dwm-tags
modules-center = title
modules-right = pulseaudio date tray powermenu

cursor-click = pointer
cursor-scroll = ns-resize

[settings]
screenchange-reload = true